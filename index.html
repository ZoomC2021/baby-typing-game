<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#667eea">
  <meta name="description" content="Baby Smash - Let your child smash the keyboard and mouse with fun sounds and colors!">
  <title>Baby Smash - Keyboard & Mouse Fun!</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="intro-overlay">
    <h1>Baby Smash</h1>
    <p>Let your child smash the keyboard and mouse!</p>
    <p class="subtitle">Every tap and click makes fun sounds and colors ✨</p>
    <div class="intro-options">
      <label><input type="checkbox" id="opt-animal-mode"> Animal sounds</label>
      <label><input type="checkbox" id="opt-speak-letters" checked> Speak letters</label>
      <label><input type="checkbox" id="opt-reduce-motion" checked> Reduce motion</label>
    </div>
    <select id="theme-select">
      <option value="rainbow">Rainbow</option>
      <option value="ocean">Ocean</option>
      <option value="forest">Forest</option>
      <option value="sunset">Sunset</option>
      <option value="space">Space</option>
    </select>
    <button id="start-btn">Let's Play!</button>
    <button id="fullscreen-btn">Go Fullscreen</button>
  </div>

  <div id="game-area">
    <div id="particles"></div>
    <div id="key-display"></div>
    <div id="letter-association" class="letter-association-card" aria-live="polite">
      <span id="letter-assoc-letter" class="letter-assoc-letter"></span>
      <span id="letter-assoc-emoji" class="letter-assoc-emoji"></span>
      <span id="letter-assoc-word" class="letter-assoc-word"></span>
    </div>
    <div id="settings-bar">
      <button id="mute-btn" title="Mute">🔊</button>
      <input type="range" id="volume-slider" min="0" max="100" value="100" title="Volume">
      <button id="parent-lock-btn" title="Parent lock (Ctrl+Shift+L to unlock)">🔓</button>
      <button id="timer-btn" title="5 min session">⏱️</button>
    </div>
    <button id="skip-btn" title="Skip intro (for parents)">Skip</button>
    <div id="celebration"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
