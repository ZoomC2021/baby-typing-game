<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baby Smash - Keyboard & Mouse Fun!</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="intro-overlay">
    <h1>Baby Smash</h1>
    <p>Let your child smash the keyboard and mouse!</p>
    <p class="subtitle">Every tap and click makes fun sounds and colors ✨</p>
    <button id="start-btn">Let's Play!</button>
    <button id="fullscreen-btn">Go Fullscreen</button>
  </div>

  <div id="game-area">
    <div id="particles"></div>
    <div id="key-display"></div>
    <button id="skip-btn" title="Skip intro (for parents)">Skip</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
